{% extends "base.html" %}
{% block title %}Мои товары{% endblock %}
{% block content %}
<h2>Мои товары</h2>
<a href="{{ url_for('add_product') }}" class="btn btn-success mb-3">Добавить товар</a>
<div class="row">
    {% for product in products %}
    <div class="col-md-4 mb-3">
        <div class="card">
            <div class="card-body">
                <h5>{{ product.name }}</h5>
                <p>{{ product.price }} ₽</p>
                <a href="{{ url_for('product_detail', product_id=product.id) }}" class="btn btn-outline-primary btn-sm">Просмотр</a>
            </div>
        </div>
    </div>
    {% else %}
    <p>У вас пока нет товаров.</p>
    {% endfor %}
</div>
{% endblock %}
